{% extends "base.html" %}
{% block content %}
<h1>영상 촬영 마취 동의서 작성</h1>
<p class="muted">CT/MRI 마취 촬영 시 사용하는 고정 양식입니다. 본문(촬영·검사 설명, 진단·영상기록 설명 등)은 자동으로 출력되며, 보호자·환자 정보와 검사 종류만 입력하시면 됩니다.</p>

<form method="post" action="{{ url_for('imaging_consent_preview') }}" target="_blank" class="form-stack">

  <!-- ① 보호자 정보 -->
  <section class="card">
    <h2>① 보호자 정보</h2>
    <div class="row-3">
      <label>보호자 ID (차트)<input name="guardian_id" placeholder="예: 4247"></label>
      <label>보호자 성명 *<input name="guardian_name" required></label>
      <label>주민등록번호 (선택)<input name="guardian_rrn"></label>
    </div>
    <div class="row-3">
      <label>전화<input name="guardian_phone"></label>
      <label>휴대전화 *<input name="guardian_mobile" required placeholder="010-0000-0000"></label>
      <label>관계
        <select name="guardian_relation">
          <option>보호자 본인</option><option>배우자</option><option>자녀</option><option>대리인</option><option>기타</option>
        </select>
      </label>
    </div>
    <label>주소<input name="guardian_address"></label>
  </section>

  <!-- ② 동물 정보 -->
  <section class="card">
    <h2>② 동물(환자) 정보</h2>
    <div class="row-3">
      <label>동물 ID (차트)<input name="animal_id"></label>
      <label>RFID (마이크로칩)<input name="rfid"></label>
      <label>이름 *<input name="patient_name" required></label>
    </div>
    <div class="row-3">
      <label>종
        <select name="species">
          <option>Canine (개)</option><option>Feline (고양이)</option><option>기타</option>
        </select>
      </label>
      <label>품종<input name="breed"></label>
      <label>피모색<input name="coat_color"></label>
    </div>
    <div class="row-3">
      <label>나이<input name="age" placeholder="예: 7년 3개월"></label>
      <label>성별
        <select name="sex">
          <option>수컷(중성화)</option><option>수컷</option>
          <option>암컷(중성화)</option><option>암컷</option>
        </select>
      </label>
      <label>체중(kg)<input name="weight" type="number" step="0.01"></label>
    </div>
  </section>

  <!-- ③ 주치의 -->
  <section class="card">
    <h2>③ 주치의</h2>
    <label>주치의 성명
      <input name="vet_name" placeholder="예: 설원장" value="{{ vet_name }}" required>
    </label>
  </section>

  <!-- ④ 영상 촬영 정보 -->
  <section class="card">
    <h2>④ 영상 촬영 정보</h2>

    <fieldset style="border:1px solid #ddd;border-radius:4px;padding:8pt 12pt;margin:0 0 8pt;">
      <legend style="font-weight:600;padding:0 6pt;">검사 종류 (복수 선택 가능) *</legend>
      <div class="row-3">
        <label style="display:flex;align-items:center;gap:6pt;">
          <input type="checkbox" name="imaging_modalities" value="CT"> CT
        </label>
        <label style="display:flex;align-items:center;gap:6pt;">
          <input type="checkbox" name="imaging_modalities" value="MRI"> MRI
        </label>
        <label style="display:flex;align-items:center;gap:6pt;">
          <input type="checkbox" name="imaging_modalities" value="초음파"> 초음파(함께)
        </label>
      </div>
    </fieldset>

    <div class="row-2">
      <label>검사명 (선택 — DB 참조 또는 직접 입력)
        <input type="text" name="exam_name" id="exam_name" list="exam-datalist"
               placeholder="예: 복부 CT, 뇌 MRI, 척추 MRI" autocomplete="off">
        <datalist id="exam-datalist">
          {% for e in exams %}
          <option value="{{ e.name }}">{{ e.category }} · {{ e.modality }}</option>
          {% endfor %}
        </datalist>
      </label>
      <label>검사 부위 / 방향
        <select name="exam_side">
          <option value="해당없음">해당없음</option>
          <option value="좌측">좌측 (Left)</option>
          <option value="우측">우측 (Right)</option>
          <option value="양측">양측 (Bilateral)</option>
        </select>
      </label>
    </div>

    <div class="row-2">
      <label>검사 예정일
        <input name="exam_date" type="date">
      </label>
      <label>분류 (선택)
        <select name="exam_category">
          <option value="">-- 미선택 --</option>
          {% for c in img_categories %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
        </select>
      </label>
    </div>

    <label>ASA 마취 위험도 등급 <span class="muted">(환자 상태 평가 후 선택 — 인쇄물에 분류표와 함께 자동 표시)</span>
      <select name="asa_grade">
        <option value="">— 미선택 —</option>
        <option value="I">Ⅰ  정상·건강 (사망률 약 0.1%)</option>
        <option value="II">Ⅱ  활동 제한 없는 경증 전신질환 (약 1%)</option>
        <option value="III">Ⅲ  활동 가능한 중증 전신질환 (약 10%)</option>
        <option value="IV">Ⅳ  생명을 위협하는 중증 전신질환 (약 30%)</option>
        <option value="V">Ⅴ  24시간 내 사망 가능한 빈사상태 (약 50%)</option>
      </select>
    </label>

    <label>개별 특이사항 / 추가 설명 (선택)
      <textarea name="extra_note" rows="2" placeholder="환자 특이사항(예: 심장병 병력, 지속 투약 중 약물, 이전 마취 반응 등)"></textarea>
    </label>
  </section>

  <div class="actions">
    <button class="btn-primary" type="submit">📄 인쇄용 미리보기 생성</button>
  </div>
</form>
{% endblock %}
