{% extends "base.html" %}
{% block content %}
<h1>{{ '영상검사 수정' if item else '새 영상검사 추가' }}</h1>
<p class="muted">각 항목은 동의서 작성 시 기본값으로 불러와지며, 환자별로 수정 가능합니다.</p>
<form method="post" class="form-stack">
  <div class="row-2">
    <label>검사명 *
      <input name="name" required value="{{ item.name if item else '' }}" placeholder="예: 복부 CT (조영), 뇌 MRI">
    </label>
    <label>분류 *
      <select name="category" required>
        {% for c in img_categories %}
          <option value="{{ c }}" {% if item and item.category == c %}selected{% endif %}>{{ c }}</option>
        {% endfor %}
      </select>
    </label>
  </div>
  <div class="row-2">
    <label>모달리티
      <select name="modality">
        {% set cur_mod = item.modality if item else 'CT' %}
        <option value="CT" {% if cur_mod == 'CT' %}selected{% endif %}>CT</option>
        <option value="MRI" {% if cur_mod == 'MRI' %}selected{% endif %}>MRI</option>
        <option value="CT,MRI" {% if cur_mod == 'CT,MRI' %}selected{% endif %}>CT + MRI</option>
      </select>
    </label>
    <label>조영제 종류
      <select name="contrast_type">
        {% set cur_ct = item.contrast_type if item else '비사용' %}
        <option value="비사용" {% if cur_ct == '비사용' %}selected{% endif %}>비사용</option>
        <option value="선택적" {% if cur_ct == '선택적' %}selected{% endif %}>선택적 (필요 시)</option>
        <option value="Iodine" {% if cur_ct == 'Iodine' %}selected{% endif %}>Iodine (CT용)</option>
        <option value="Gadolinium" {% if cur_ct == 'Gadolinium' %}selected{% endif %}>Gadolinium (MRI용)</option>
      </select>
    </label>
  </div>
  <label>검사 목적 및 기대효과
    <textarea name="purpose_effect" rows="3">{{ item.purpose_effect if item else '' }}</textarea>
  </label>
  <label>검사 방법
    <textarea name="procedure" rows="3">{{ item.procedure if item else '' }}</textarea>
  </label>
  <label>예상 합병증 및 리스크
    <textarea name="complications" rows="4">{{ item.complications if item else '' }}</textarea>
  </label>
  <label>진정·마취 관련 주의사항
    <textarea name="sedation_note" rows="2">{{ item.sedation_note if item else '' }}</textarea>
  </label>
  <label>검사 후 주의사항
    <textarea name="post_care" rows="2">{{ item.post_care if item else '' }}</textarea>
  </label>
  <div class="row-2">
    <label>예상 소요시간
      <input name="expected_duration" value="{{ item.expected_duration if item else '' }}" placeholder="예: 15~30분">
    </label>
    <label>예상 비용
      <input name="estimated_cost" value="{{ item.estimated_cost if item else '' }}" placeholder="예: 60~120만원">
    </label>
  </div>
  <label>비고
    <input name="notes" value="{{ item.notes if item else '' }}">
  </label>
  <div class="actions">
    <a class="btn-ghost" href="{{ url_for('imaging_list') }}">취소</a>
    <button class="btn-primary" type="submit">저장</button>
  </div>
</form>
{% endblock %}
